{% extends "base.html" %}

{% block content %}
<div class="column is-4 is-offset-4">
    <h3 class="title has-text-white">Login</h3>

    <div class="box">
        {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="notification is-danger">
                {{ messages[0] }}
            </div>
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login_post') }}">
            <div class="field">
                <div class="control">
                    <input class="input is-large" type="email" name="email" placeholder="Correo electrónico" required autofocus>
                </div>
            </div>

            <div class="field">
                <div class="control">
                    <input class="input is-large" type="password" name="password" placeholder="Contraseña" required>
                </div>
            </div>

            <div class="field has-text-left">
                <label class="checkbox">
                    <input type="checkbox" name="remember">
                    Recuérdame
                </label>
            </div>

            <button class="button is-block is-link is-large is-fullwidth">
                Iniciar sesión
            </button>
        </form>
    </div>
</div>
{% endblock %}
